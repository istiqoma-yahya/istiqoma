kind = "video"
previewPath = "/demo/"
title = "Istiqoma Product Demo"
version = "1.0.0"
id = "artifacts/istiqoma-demo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/demo/" ]
localPort = 19906

[services.development]
run = "pnpm --filter @workspace/istiqoma-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/istiqoma-demo", "run", "build" ]
publicDir = "artifacts/istiqoma-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19906"
BASE_PATH = "/demo/"
